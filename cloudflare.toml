# ============================================
# Cloudflare Pages Configuration
# Project: Aluminum Management System
# ============================================

name = "aluminum-management-system"
pages_build_output_dir = ".next"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# ============================================
# Build Configuration
# ============================================
# Cloudflare will automatically run: bun run build
# Or you can specify custom build command:
# [build]
# command = "bun run build"
# cwd = "."
# watch_dir = "src"

# ============================================
# Public Environment Variables
# (Safe to commit - visible in client code)
# ============================================
[vars]
NODE_ENV = "production"

# Supabase - Public
NEXT_PUBLIC_SUPABASE_URL = "https://cduuwyrtbtduumwgmydp.supabase.co"
NEXT_PUBLIC_SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNkdXV3eXJ0YnRkdXVtd2dteWRwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxNzg2NDYsImV4cCI6MjA5Nzc1NDY0Nn0.-wmuaUF63I_py-DjZlR-YwZ6xAJKzNCbOq8n0C0akR0"

# ============================================
# Custom Domain Routes (uncomment when ready)
# ============================================
# routes = [
#   { pattern = "yourdomain.com/*", zone_name = "yourdomain.com" },
#   { pattern = "www.yourdomain.com/*", zone_name = "yourdomain.com" }
# ]

# ============================================
# Headers
# ============================================
[[headers]]
for = "/*"
[headers.values]
X-Frame-Options = "DENY"
X-Content-Type-Options = "nosniff"
Referrer-Policy = "strict-origin-when-cross-origin"
Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
for = "/_next/static/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

